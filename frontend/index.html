<!DOCTYPE html>
<html>
<head>
    <title>AI YouTube Recommender</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>🎥 AI YouTube Recommender</h1>

    <!-- 🔍 Search Box -->

        <button onclick="searchVideos()">Search</button>

    <!-- 🎬 Videos -->

    <div id="videos"></div>

    <!-- 🤖 Recommendations -->
    <h2>Recommended Channels</h2>
    <div id="recommendations"></div>

</div>

<script src="script.js"></script>

</body>
</html>
